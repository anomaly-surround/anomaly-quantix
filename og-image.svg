<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a15"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g stroke="#2a2a4a" stroke-width="1" opacity="0.3">
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
  </g>

  <!-- Highlighted cells -->
  <rect x="200" y="126" width="200" height="126" fill="#6c5ce7" opacity="0.08"/>
  <rect x="600" y="252" width="200" height="126" fill="#6c5ce7" opacity="0.08"/>
  <rect x="400" y="126" width="200" height="126" fill="none" stroke="#6c5ce7" stroke-width="2" opacity="0.3"/>

  <!-- Title -->
  <text x="600" y="270" text-anchor="middle" font-family="Segoe UI, sans-serif" font-weight="800" font-size="56" fill="white">Anomaly Quantix</text>
  <text x="600" y="330" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="24" fill="#8888bb">A powerful spreadsheet that lives in your browser</text>

  <!-- Badges -->
  <g font-family="Segoe UI, sans-serif" font-size="16" fill="#8888bb">
    <rect x="340" y="370" width="80" height="32" rx="16" fill="none" stroke="#2a2a4a"/>
    <text x="380" y="391" text-anchor="middle">Free</text>
    <rect x="440" y="370" width="120" height="32" rx="16" fill="none" stroke="#2a2a4a"/>
    <text x="500" y="391" text-anchor="middle">No Sign-up</text>
    <rect x="580" y="370" width="100" height="32" rx="16" fill="none" stroke="#2a2a4a"/>
    <text x="630" y="391" text-anchor="middle">Offline</text>
    <rect x="700" y="370" width="100" height="32" rx="16" fill="none" stroke="#2a2a4a"/>
    <text x="750" y="391" text-anchor="middle">Private</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#accent)"/>
</svg>
