<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a29bfe" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#2a2a4a" stroke-width="1.5" opacity="0.5">
    <!-- Vertical -->
    <line x1="128" y1="60" x2="128" y2="452"/>
    <line x1="213" y1="60" x2="213" y2="452"/>
    <line x1="299" y1="60" x2="299" y2="452"/>
    <line x1="384" y1="60" x2="384" y2="452"/>
    <!-- Horizontal -->
    <line x1="60" y1="128" x2="452" y2="128"/>
    <line x1="60" y1="213" x2="452" y2="213"/>
    <line x1="60" y1="299" x2="452" y2="299"/>
    <line x1="60" y1="384" x2="452" y2="384"/>
  </g>

  <!-- Highlighted cells (accent glow) -->
  <rect x="128" y="128" width="85" height="85" fill="url(#glow)" rx="4"/>
  <rect x="213" y="213" width="86" height="86" fill="url(#glow)" rx="4"/>
  <rect x="299" y="128" width="85" height="85" fill="url(#glow)" rx="4"/>
  <rect x="128" y="299" width="85" height="85" fill="url(#glow)" rx="4"/>

  <!-- Selected cell highlight -->
  <rect x="213" y="128" width="86" height="85" fill="none" stroke="url(#accent)" stroke-width="3" rx="4"/>

  <!-- Q letter -->
  <g fill="none" stroke="url(#accent)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="248" cy="240" r="100"/>
    <line x1="310" y1="310" x2="370" y2="380"/>
  </g>

  <!-- Small formula text -->
  <text x="145" y="410" font-family="monospace" font-size="28" fill="#6c5ce7" opacity="0.6">fx</text>

  <!-- Accent dot -->
  <circle cx="380" cy="400" r="12" fill="url(#accent)"/>

  <!-- Corner border accent -->
  <rect x="60" y="60" width="392" height="392" rx="20" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.2"/>
</svg>
